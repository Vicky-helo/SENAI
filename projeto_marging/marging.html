<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euzinha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>✨ Margin e Padding — Estilo Criadora</h1>
    </header>

    <main>
        <div class="bb">
            <p>💄 Padding: 30px — espaço interno</p>

            <p>
            O bloco rosa cresceu para dentro.
            </p>
        </div>

        <div class="rosa">
            <p>📱 Margin: 30px — espaço externo</p>

            <p>O bloco se afastou dos outros</p>
        </div>

        <div class="roxa">
            <p>🌟 Margin: 20px + Padding: 20px</p>

            <p>Margin afasta por fora. Padding cresce por dentro.</p>
        </div>
    </main>
</body>
</html>
